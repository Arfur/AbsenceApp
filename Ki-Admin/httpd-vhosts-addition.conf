# 
# Description:
# This content should be ADDED to your XAMPP virtual hosts file:
# D:\xampp\apache\conf\extra\httpd-vhosts.conf
# 
# Instructions:
# 1. Open D:\xampp\apache\conf\extra\httpd-vhosts.conf
# 2. Add the VirtualHost block below to the end of the file
# 3. Save the file
# 4. Restart Apache in XAMPP Control Panel
# =========================================================

# Ki-admin Laravel Project Virtual Host
<VirtualHost *:80>
    DocumentRoot "d:/OneDrive/(60) Website Projects/ki-admin/public"
    ServerName ki-admin.test
    ServerAlias www.ki-admin.test
    
    <Directory "d:/OneDrive/(60) Website Projects/ki-admin/public">
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>
    
    # Enable URL rewriting
    RewriteEngine On
    
    # Log files for debugging
    ErrorLog "logs/ki-admin_error.log"
    CustomLog "logs/ki-admin_access.log" combined
</VirtualHost>

# For HTTPS (Port 443) - Add this if you want HTTPS support
<VirtualHost *:443>
    DocumentRoot "d:/OneDrive/(60) Website Projects/ki-admin/public"
    ServerName ki-admin.test
    ServerAlias www.ki-admin.test
    
    <Directory "d:/OneDrive/(60) Website Projects/ki-admin/public">
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>
    
    # Enable URL rewriting
    RewriteEngine On
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile "conf/ssl.crt/server.crt"
    SSLCertificateKeyFile "conf/ssl.key/server.key"
    
    # Log files for debugging
    ErrorLog "logs/ki-admin_ssl_error.log"
    CustomLog "logs/ki-admin_ssl_access.log" combined
</VirtualHost>
