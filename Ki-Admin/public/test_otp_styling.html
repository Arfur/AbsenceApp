<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Input Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 50px;
        }
        
        .otp-input {
            height: 80px !important;
            width: 80px !important;
            font-size: 48px !important;
            font-weight: bold !important;
            text-align: center !important;
            border: 2px solid #ddd !important;
            border-radius: 8px !important;
            margin: 0 5px !important;
            background-color: white !important;
            color: #333 !important;
            box-sizing: border-box !important;
        }

        .otp-input:focus {
            border-color: #007bff !important;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25) !important;
            outline: none !important;
        }

        .verification-box {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 10px !important;
        }

        /* Override any bootstrap form-control styles */
        input.form-control.otp-input {
            height: 80px !important;
            width: 80px !important;
            font-size: 48px !important;
            padding: 0 !important;
            line-height: 1 !important;
            min-height: 80px !important;
        }
        
        .verify-button {
            width: 540px !important;
            max-width: 100% !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">OTP Input Test - 6 Digits with 48px Font</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="verification-box mb-3">
                    <div>
                        <input class="form-control otp-input" id="one" name="digit1" maxlength="1" type="text">
                    </div>
                    <div>
                        <input class="form-control otp-input" id="two" name="digit2" maxlength="1" type="text">
                    </div>
                    <div>
                        <input class="form-control otp-input" id="three" name="digit3" maxlength="1" type="text">
                    </div>
                    <div>
                        <input class="form-control otp-input" id="four" name="digit4" maxlength="1" type="text">
                    </div>
                    <div>
                        <input class="form-control otp-input" id="five" name="digit5" maxlength="1" type="text">
                    </div>
                    <div>
                        <input class="form-control otp-input" id="six" name="digit6" maxlength="1" type="text">
                    </div>
                </div>
                <div class="text-center mb-3">
                    <p>Combined OTP: <span id="combined-otp">______</span></p>
                </div>
                <div class="text-center">
                    <button class="btn btn-primary btn-lg verify-button" type="button">Verify Email</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Enhanced OTP input handling
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.otp-input');
            
            inputs.forEach((input, index) => {
                // Add event listeners
                input.addEventListener('input', function(e) {
                    handleInput(e, index);
                });
                
                input.addEventListener('keydown', function(e) {
                    handleKeydown(e, index);
                });
                
                input.addEventListener('paste', function(e) {
                    handlePaste(e, index);
                });
            });
            
            // Auto-focus first input
            if (inputs.length > 0) {
                inputs[0].focus();
            }
        });

        function handleInput(e, index) {
            const input = e.target;
            const inputs = document.querySelectorAll('.otp-input');
            
            // Allow only digits
            input.value = input.value.replace(/[^0-9]/g, '');
            
            // Move to next input if digit entered
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            
            updateDisplay();
        }

        function handleKeydown(e, index) {
            const inputs = document.querySelectorAll('.otp-input');
            
            // Handle Backspace
            if (e.key === 'Backspace') {
                if (e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            }
            
            // Handle Tab navigation
            if (e.key === 'Tab') {
                e.preventDefault();
                if (e.shiftKey) {
                    // Shift+Tab - go backward
                    if (index > 0) {
                        inputs[index - 1].focus();
                    }
                } else {
                    // Tab - go forward
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                }
            }
            
            // Handle Arrow Keys
            if (e.key === 'ArrowLeft' && index > 0) {
                e.preventDefault();
                inputs[index - 1].focus();
            }
            if (e.key === 'ArrowRight' && index < inputs.length - 1) {
                e.preventDefault();
                inputs[index + 1].focus();
            }
        }

        function handlePaste(e, index) {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData('text');
            const digits = paste.replace(/[^0-9]/g, '').split('');
            const inputs = document.querySelectorAll('.otp-input');
            
            // Fill inputs with pasted digits
            for (let i = 0; i < Math.min(digits.length, inputs.length - index); i++) {
                inputs[index + i].value = digits[i];
            }
            
            // Focus the next empty input or the last filled input
            const nextIndex = Math.min(index + digits.length, inputs.length - 1);
            inputs[nextIndex].focus();
            
            updateDisplay();
        }

        function updateDisplay() {
            const inputs = document.querySelectorAll('.otp-input');
            const digits = Array.from(inputs).map(input => input.value || '_');
            document.getElementById('combined-otp').textContent = digits.join('');
        }
    </script>
</body>
</html>
