# 
# Author    : Michael Battle
# Created On: 02/August/2025
# Updated On: 02/August/2025
# 
# Description:
# Apache Virtual Host configuration for Ki-admin Laravel project.
# This file should be copied to D:\xampp\apache\conf\extra\httpd-vhosts.conf
# 
# Key Changes:
# - HTTPS-ready configuration for ki-admin.test domain
# - Proper document root pointing to Laravel public directory
# - AllowOverride All for .htaccess support
# =========================================================

<VirtualHost *:80>
    DocumentRoot "d:/OneDrive/(60) Website Projects/ki-admin/public"
    ServerName ki-admin.test
    ServerAlias www.ki-admin.test
    
    <Directory "d:/OneDrive/(60) Website Projects/ki-admin/public">
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>
    
    # Enable URL rewriting
    RewriteEngine On
    
    # Log files for debugging
    ErrorLog "logs/ki-admin_error.log"
    CustomLog "logs/ki-admin_access.log" combined
</VirtualHost>

