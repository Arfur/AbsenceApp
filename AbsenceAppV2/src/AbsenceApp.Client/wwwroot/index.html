<!--
===============================================================================
 File        : index.html
 Location    : wwwroot (AbsenceApp.Client)
 Platform    : Blazor Hybrid (WebView2 / WinUI)
 Author      : Michael
 Version     : 1.0.2
 Created     : 2026-03-13
 Updated     : 2026-05-18
-------------------------------------------------------------------------------
 Purpose     : Root HTML host page for the Blazor Hybrid application.
               - Loads the Blazor runtime and bootstraps the WebView2 host.
               - Provides the <div id="app"> mount point for the Blazor UI.
               - Loads global CSS, design system tokens, component styles,
                 Bootstrap, Bootstrap Icons (local bundle), and Tabler Icons.
-------------------------------------------------------------------------------
 Changes     :
   - 1.0.0  2026-03-13  Initial implementation.
   - 1.0.1  2026-05-17  Added Tabler Icons to support Icon Buttons in UI Kits.
   - 1.0.2  2026-05-18  Replaced Bootstrap Icons CDN link with local bundle
                         (css/bootstrap/bootstrap-icons.min.css). Removes CDN
                         dependency so icons load correctly in MAUI WebView2
                         regardless of internet connectivity.
-------------------------------------------------------------------------------
 Notes       :
   - This file is required for Blazor Hybrid apps even though the UI is hosted
     inside a native WebView2 control.
   - Tabler Icons are required for all <i class="ti ..."> icons used in the
     Buttons page (Icon Buttons section).
===============================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AbsenceApp.Client</title>
    <base href="/" />

    <!-- Bootstrap + Bootstrap Icons (local bundle — no CDN dependency) -->
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap-icons.min.css" />

    <!-- App + Design System -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/tokens/spacing.css" />
    <link rel="stylesheet" href="css/tokens/colors.css" />
    <link rel="stylesheet" href="css/tokens/typography.css" />
    <link rel="stylesheet" href="css/tokens/radius.css" />
    <link rel="stylesheet" href="css/tokens/layout.css" />
    <link rel="stylesheet" href="css/tokens/components.css" />
    <link href="css/components/cards.css" rel="stylesheet" />
    <link href="css/components/forms.css" rel="stylesheet" />
    <link href="css/components/stats.css" rel="stylesheet" />
    <link href="css/components/buttons.css" rel="stylesheet" />
    <link rel="stylesheet" href="AbsenceApp.Client.styles.css?v=3" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <!-- =====================================================================
         App bootstrap loader — shown until Blazor renders the first frame.
         Style mirrors the Ki-Admin loader_24 / loader-wrapper pattern.
         ===================================================================== -->
    <style>
        .aa-boot-loader {
            position: fixed; inset: 0;
            background: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 18px; z-index: 9000;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .aa-boot-loader__ring {
            width: 48px; height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: aa-boot-spin 0.8s linear infinite;
        }
        .aa-boot-loader__text {
            font-size: 0.9rem; font-weight: 600;
            color: #6b7280; letter-spacing: 0.5px;
        }
        @keyframes aa-boot-spin { to { transform: rotate(360deg); } }
    </style>

    <div id="app">
        <div class="aa-boot-loader">
            <div class="aa-boot-loader__ring"></div>
            <span class="aa-boot-loader__text">Loading AbsenceApp&hellip;</span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x2716;</a>
    </div>

    <!-- Diagnostic: capture all unhandled JS/Blazor errors and show them -->
    <div id="diag-error" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:white;color:red;font-family:monospace;padding:1rem;font-size:0.8rem;overflow:auto;z-index:99999;white-space:pre-wrap;"></div>
    <script>
        function showDiag(msg) {
            var d = document.getElementById('diag-error');
            d.style.display = 'block';
            d.textContent += msg + '\n---\n';
        }
        window.onerror = function(msg, src, line, col, err) {
            showDiag('JS Error: ' + msg + '\nAt: ' + src + ':' + line + '\n' + (err ? err.stack : ''));
        };
        window.addEventListener('unhandledrejection', function(e) {
            showDiag('Unhandled Promise: ' + (e.reason ? (e.reason.stack || e.reason) : 'unknown'));
        });
        var observer = new MutationObserver(function() {
            var ui = document.getElementById('blazor-error-ui');
            if (ui && ui.style.display !== 'none') {
                showDiag('[Blazor circuit error detected - see above for details]');
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            var ui = document.getElementById('blazor-error-ui');
            if (ui) observer.observe(ui, { attributes: true, attributeFilter: ['style'] });
        });
    </script>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>
</html>
