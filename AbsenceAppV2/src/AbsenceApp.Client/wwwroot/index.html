<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AbsenceApp.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- V2 Design System Tokens: must come AFTER app.css so that V2 tokens
         can reference V1 custom properties (--text, --chrome-bg, etc.) -->
    <link rel="stylesheet" href="css/tokens/spacing.css" />
    <link rel="stylesheet" href="css/tokens/colors.css" />
    <link rel="stylesheet" href="css/tokens/typography.css" />
    <link rel="stylesheet" href="css/tokens/radius.css" />
    <link rel="stylesheet" href="css/tokens/layout.css" />
    <link rel="stylesheet" href="AbsenceApp.Client.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x2716;</a>
    </div>

    <!-- Diagnostic: capture all unhandled JS/Blazor errors and show them -->
    <div id="diag-error" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:white;color:red;font-family:monospace;padding:1rem;font-size:0.8rem;overflow:auto;z-index:99999;white-space:pre-wrap;"></div>
    <script>
        function showDiag(msg) {
            var d = document.getElementById('diag-error');
            d.style.display = 'block';
            d.textContent += msg + '\n---\n';
        }
        window.onerror = function(msg, src, line, col, err) {
            showDiag('JS Error: ' + msg + '\nAt: ' + src + ':' + line + '\n' + (err ? err.stack : ''));
        };
        window.addEventListener('unhandledrejection', function(e) {
            showDiag('Unhandled Promise: ' + (e.reason ? (e.reason.stack || e.reason) : 'unknown'));
        });
        // Watch for Blazor circuit errors - they trigger the error UI
        var observer = new MutationObserver(function() {
            var ui = document.getElementById('blazor-error-ui');
            if (ui && ui.style.display !== 'none') {
                showDiag('[Blazor circuit error detected - see above for details]');
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            var ui = document.getElementById('blazor-error-ui');
            if (ui) observer.observe(ui, { attributes: true, attributeFilter: ['style'] });
        });
    </script>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
