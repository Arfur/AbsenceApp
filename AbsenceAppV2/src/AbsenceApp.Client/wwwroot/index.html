<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AbsenceApp.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- V2 Design System Tokens: must come AFTER app.css so that V2 tokens
         can reference V1 custom properties (--text, --chrome-bg, etc.) -->
    <link rel="stylesheet" href="css/tokens/spacing.css" />
    <link rel="stylesheet" href="css/tokens/colors.css" />
    <link rel="stylesheet" href="css/tokens/typography.css" />
    <link rel="stylesheet" href="css/tokens/radius.css" />
    <link rel="stylesheet" href="css/tokens/layout.css" />
    <link rel="stylesheet" href="css/tokens/components.css" />
    <link href="css/components/cards.css" rel="stylesheet" />
    <link href="css/components/forms.css" rel="stylesheet" />
    <link href="css/components/stats.css" rel="stylesheet" />
    <link href="css/components/buttons.css" rel="stylesheet" />
    <link href="css/global-settings/layout-demo.css" rel="stylesheet" />
    <link rel="stylesheet" href="AbsenceApp.Client.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <!-- =====================================================================
         App bootstrap loader — shown until Blazor renders the first frame.
         Style mirrors the Ki-Admin loader_24 / loader-wrapper pattern.
         ===================================================================== -->
    <style>
        .aa-boot-loader {
            position: fixed; inset: 0;
            background: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 18px; z-index: 9000;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .aa-boot-loader__ring {
            width: 48px; height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: aa-boot-spin 0.8s linear infinite;
        }
        .aa-boot-loader__text {
            font-size: 0.9rem; font-weight: 600;
            color: #6b7280; letter-spacing: 0.5px;
        }
        @keyframes aa-boot-spin { to { transform: rotate(360deg); } }
    </style>

    <div id="app">
        <div class="aa-boot-loader">
            <div class="aa-boot-loader__ring"></div>
            <span class="aa-boot-loader__text">Loading AbsenceApp&hellip;</span>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x2716;</a>
    </div>

    <!-- Diagnostic: capture all unhandled JS/Blazor errors and show them -->
    <div id="diag-error" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:white;color:red;font-family:monospace;padding:1rem;font-size:0.8rem;overflow:auto;z-index:99999;white-space:pre-wrap;"></div>
    <script>
        function showDiag(msg) {
            var d = document.getElementById('diag-error');
            d.style.display = 'block';
            d.textContent += msg + '\n---\n';
        }
        window.onerror = function(msg, src, line, col, err) {
            showDiag('JS Error: ' + msg + '\nAt: ' + src + ':' + line + '\n' + (err ? err.stack : ''));
        };
        window.addEventListener('unhandledrejection', function(e) {
            showDiag('Unhandled Promise: ' + (e.reason ? (e.reason.stack || e.reason) : 'unknown'));
        });
        // Watch for Blazor circuit errors - they trigger the error UI
        var observer = new MutationObserver(function() {
            var ui = document.getElementById('blazor-error-ui');
            if (ui && ui.style.display !== 'none') {
                showDiag('[Blazor circuit error detected - see above for details]');
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            var ui = document.getElementById('blazor-error-ui');
            if (ui) observer.observe(ui, { attributes: true, attributeFilter: ['style'] });
        });
    </script>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
