<?xml version="1.0" encoding="UTF-8"?>
<!--
  App icon: blue rounded-square calendar with green tick badge.
  Used by MAUI build to generate all platform icon sizes.
  Designed to match the blue calendar + green checkmark style.
-->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Blue rounded-square background -->
  <rect width="512" height="512" rx="90" fill="#4285F4"/>

  <!-- Calendar body — white rectangle -->
  <rect x="104" y="152" width="272" height="220" rx="14" fill="white"/>

  <!-- Calendar header — blue strip across the top of the body -->
  <rect x="104" y="152" width="272" height="54" rx="14" fill="#4285F4"/>
  <!-- Fill the bottom corners of the header to keep them square -->
  <rect x="104" y="182" width="272" height="24" fill="#4285F4"/>

  <!-- Binding posts (white vertical tabs above the body) -->
  <rect x="178" y="116" width="26" height="54" rx="13" fill="white"/>
  <rect x="308" y="116" width="26" height="54" rx="13" fill="white"/>

  <!-- Calendar grid: 4 columns × 3 rows of blue cells on the white body -->
  <!-- Row 1 -->
  <rect x="116" y="220" width="54" height="38" rx="5" fill="#4285F4"/>
  <rect x="182" y="220" width="54" height="38" rx="5" fill="#4285F4"/>
  <rect x="248" y="220" width="54" height="38" rx="5" fill="#4285F4"/>
  <rect x="314" y="220" width="46" height="38" rx="5" fill="#4285F4"/>
  <!-- Row 2 -->
  <rect x="116" y="272" width="54" height="38" rx="5" fill="#4285F4"/>
  <rect x="182" y="272" width="54" height="38" rx="5" fill="#4285F4"/>
  <rect x="248" y="272" width="54" height="38" rx="5" fill="#4285F4"/>
  <rect x="314" y="272" width="46" height="38" rx="5" fill="#4285F4"/>
  <!-- Row 3 (partial — clipped cleanly by the white body's bottom) -->
  <rect x="116" y="324" width="54" height="36" rx="5" fill="#4285F4"/>
  <rect x="182" y="324" width="54" height="36" rx="5" fill="#4285F4"/>

  <!-- Green badge — white ring then green fill for slight border effect -->
  <circle cx="376" cy="376" r="102" fill="white"/>
  <circle cx="376" cy="376" r="90"  fill="#34A853"/>

  <!-- White checkmark inside badge -->
  <polyline points="332,375 358,403 420,337"
            fill="none" stroke="white" stroke-width="28"
            stroke-linecap="round" stroke-linejoin="round"/>

</svg>